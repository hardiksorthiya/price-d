# Shopify App Configuration

client_id = "814851efaf52e772eabf1d5d5d7583a1"
name = "Price Breakup"
application_url = "https://price-d.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "write_products,read_inventory,write_inventory,write_metaobjects,write_metaobject_definitions"

[auth]
redirect_urls = ["https://price-d.onrender.com/auth/callback"]

# Product metafield
[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

# Product metafield (stores variant breakup map)
[product.metafields.price_breakup.data]
type = "json"
name = "Price breakup"
description = "Stores calculated product price breakup for storefront rendering"

  [product.metafields.price_breakup.data.access]
  admin = "merchant_read_write"
  storefront = "public_read"

# Example metaobject (optional)
[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
